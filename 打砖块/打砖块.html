  ctx.fillText('霓虹破壁', W/2 - Math.sin(t) * 4, titleY);
  ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 16; ctx.shadowColor = '#fff';
  ctx.fillText('霓虹破壁', W/2, titleY);

  ctx.font = 'bold 18px ' + FONT;
  ctx.fillStyle = '#7c5fff'; ctx.shadowBlur = 8; ctx.shadowColor = '#7c5fff';
  ctx.fillText('N E O N   B R E A K E R   ·   P R O T O C O L', W/2, titleY + 60);

  ctx.font = 'bold 13px ' + FONT;
  ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 4; ctx.shadowColor = '#fff';
  const lines = [
    'A / D = 挡板  ·  Enter / 左键 = 发射  ·  右键 / Shift = 量子刺  ·  Q = 凝固',
    '空格 = 霓虹波    ·    P = 暂停    ·    R = 重开    ·    M = 静音',
    '',
    '开局先选 1 张起手协议  ·  12 关肉鸽  ·  关间 3 选 1  ·  BOSS 关必出稀有卡',
    '4 build 流派 (雷电链 · 黑洞 · 时间 · 寄生)  ·  19 张协议卡  ·  无废卡',
  ];
  lines.forEach((l, i) => ctx.fillText(l, W/2, H * 0.55 + i * 24));

  // Brick legend
  const legY = H * 0.70;
  const legends = [
    ['#39ffea', '普通'],
    ['#a0a8c0', '钢'],
    ['#ff5a30', '爆炸'],
    ['#ff66ee', '神秘'],
    ['#3a3a4a', '不灭'],
    ['#ffd400', '移动'],
  ];
  const lw = 80;
  const totalW = legends.length * lw;
  ctx.font = 'bold 11px ' + FONT;
  legends.forEach(([c, name], i) => {
    const lx = W/2 - totalW/2 + i * lw + lw/2;
    ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = 12;
    rrect(lx - 22, legY - 8, 44, 16, 3); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.fillText(name, lx, legY + 18);
  });

  // Start prompt blink
  if (Math.sin(Game.startT * 4) > 0) {
    ctx.font = 'bold 24px ' + FONT;
    ctx.fillStyle = '#ffd400'; ctx.shadowColor = '#ffd400'; ctx.shadowBlur = 16;
    ctx.fillText('▶  点击开始  ◀', W/2, H * 0.86);
  }

  if (Game.highScore > 0) {
    ctx.font = 'bold 13px ' + FONT;
    ctx.fillStyle = '#ffd400'; ctx.shadowColor = '#ffd400'; ctx.shadowBlur = 6;
    ctx.fillText('最高分  ' + Game.highScore, W/2, H - 28);
  }
  ctx.restore();
}

function drawPaused() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.62)';
  ctx.fillRect(-50, -50, W + 100, H + 100);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 64px ' + FONT;
  ctx.fillStyle = '#fff'; ctx.shadowBlur = 16; ctx.shadowColor = '#fff';
  ctx.fillText('暂停', W/2, H/2 - 30);
  ctx.font = 'bold 16px ' + FONT;
  ctx.fillText('按 [P] 继续', W/2, H/2 + 30);
  ctx.restore();
}

function drawLevelClear() {
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = 'bold 52px ' + FONT;
  ctx.fillStyle = '#ffd400'; ctx.shadowBlur = 24; ctx.shadowColor = '#ffd400';
  ctx.fillText('关卡 ' + Game.level + ' 通关', W/2, H/2);
  ctx.font = 'bold 14px ' + FONT;
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 6;
  ctx.fillText('准备进入下一关...', W/2, H/2 + 50);
  ctx.restore();
}

function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.72)';
  ctx.fillRect(-50, -50, W + 100, H + 100);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  ctx.font = 'bold 76px ' + FONT;
  ctx.fillStyle = '#ff5050'; ctx.shadowBlur = 24; ctx.shadowColor = '#ff5050';
  ctx.fillText('游戏结束', W/2, H * 0.22);

  if (Game.score === Game.highScore && Game.score > 0) {
    ctx.font = 'bold 22px ' + FONT;
    ctx.fillStyle = '#ffd400'; ctx.shadowColor = '#ffd400'; ctx.shadowBlur = 14;
    ctx.fillText('★  新   纪   录  ★', W/2, H * 0.34);
  }

  ctx.font = 'bold 16px ' + FONT;
  ctx.shadowBlur = 8;
  const stats = [
    ['最终得分', Game.score],
    ['最高得分', Game.highScore],
    ['到达关卡', Game.level],
    ['击破砖块', Game.bricksBroken],
    ['最大连击', Game.maxCombo],
    ['最长连锁爆炸', Game.maxChain],
    ['宝石拾取', Game.gemsCaught],
    ['TARGET 命中', Game.targetsHit],
  ];
  stats.forEach((s, i) => {
    const y = H * 0.40 + i * 26;
    ctx.textAlign = 'right';
    ctx.fillStyle = '#7c5fff'; ctx.shadowColor = '#7c5fff';
    ctx.fillText(s[0], W/2 - 16, y);
    ctx.textAlign = 'left';
    ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff';
    ctx.fillText('  ' + s[1], W/2 + 16, y);
  });

  if (Math.sin(Game.startT * 4) > 0) {
    ctx.font = 'bold 20px ' + FONT;
    ctx.fillStyle = '#39ffea'; ctx.shadowColor = '#39ffea'; ctx.shadowBlur = 14;
    ctx.textAlign = 'center';
    ctx.fillText('▶  点击 / 按 R 再来一次  ◀', W/2, H * 0.86);
  }
  ctx.restore();
}

function drawCursor() {
  ctx.save();
  ctx.shadowBlur = 8; ctx.shadowColor = '#fff';
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, 7, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(mouse.x - 12, mouse.y); ctx.lineTo(mouse.x - 4, mouse.y);
  ctx.moveTo(mouse.x + 4, mouse.y); ctx.lineTo(mouse.x + 12, mouse.y);
  ctx.moveTo(mouse.x, mouse.y - 12); ctx.lineTo(mouse.x, mouse.y - 4);
  ctx.moveTo(mouse.x, mouse.y + 4); ctx.lineTo(mouse.x, mouse.y + 12);
  ctx.stroke();
  ctx.restore();
}

/* ---------------- Input ---------------- */
const mouse = { x: W/2, y: H/2, down: false };
function getMousePos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.width / rect.width;
  const sy = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * sx,
    y: (e.clientY - rect.top) * sy,
  };
}
canvas.addEventListener('mousemove', (e) => {
  const p = getMousePos(e);
  const moved = (Math.abs(p.x - mouse.x) + Math.abs(p.y - mouse.y)) > 0.5;
  mouse.x = p.x; mouse.y = p.y;
  // Only sync card-select selection when the mouse actually moves
  // (so keyboard A/D doesn't get overridden every frame)
  if (moved && Game.state === 'card_select' && Game.cardChoices) {
    const layout = cardSelectLayout();
    for (let i = 0; i < layout.length; i++) {
      const r = layout[i];
      if (mouse.x >= r.x && mouse.x <= r.x + r.w &&
          mouse.y >= r.y - 24 && mouse.y <= r.y + r.h) {
        Game.selectedCard = i;
        break;
      }
    }
  }
  // Mouse drives paddle (parallel to A/D, last to write each frame wins)
  if (moved && Game.paddle && (Game.state === 'playing' || Game.state === 'paused')) {
    Game.paddle.x = clamp(mouse.x - Game.paddle.w/2, 0, W - Game.paddle.w);
  }
});
canvas.addEventListener('mousedown', () => {
  ensureAudio();
  mouse.down = true;
  if (Game.state === 'menu') { newGame(); return; }
  if (Game.state === 'gameover') { newGame(); return; }
  if (Game.state === 'victory_run') { newGame(); return; }
  if (Game.state === 'paused') { Game.state = 'playing'; return; }
  if (Game.state === 'card_select') {
    const layout = cardSelectLayout();
    for (let i = 0; i < layout.length; i++) {
      const r = layout[i];
      if (mouse.x >= r.x && mouse.x <= r.x + r.w &&
          mouse.y >= r.y - 20 && mouse.y <= r.y + r.h) {
        pickCard(i);
        return;
      }
    }
    return;
  }
  if (Game.state === 'playing') {
    for (const ball of Game.balls) if (ball.attached) launchBall(ball);
  }
});
canvas.addEventListener('mouseup', () => { mouse.down = false; });
canvas.addEventListener('contextmenu', (e) => {
  e.preventDefault();
  ensureAudio();
  fireDash();
});

window.addEventListener('keydown', (e) => {
  // ----- card_select: A/D nav, Enter pick, 1/2/3 direct -----
  if (Game.state === 'card_select') {
    if (e.key === '1' || e.key === '2' || e.key === '3') {
      e.preventDefault();
      pickCard(parseInt(e.key, 10) - 1);
      return;
    }
    if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
      e.preventDefault();
      Game.selectedCard = Math.max(0, Game.selectedCard - 1);
      playSfx('hit');
      return;
    }
    if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
      e.preventDefault();
      Game.selectedCard = Math.min((Game.cardChoices || []).length - 1, Game.selectedCard + 1);
      playSfx('hit');
      return;
    }
    if (e.key === 'Enter' || e.key === ' ' || e.code === 'Space') {
      e.preventDefault();
      ensureAudio();
      pickCard(Game.selectedCard);
      return;
    }
  }

  // ----- A/D paddle control during play -----
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') {
    if (Game.state === 'playing' || Game.state === 'paused') {
      Game.keys.a = true;
      e.preventDefault();
      return;
    }
  }
  if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') {
    if (Game.state === 'playing' || Game.state === 'paused') {
      Game.keys.d = true;
      e.preventDefault();
      return;
    }
  }

  // ----- Other global keys -----
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    ensureAudio();
    if (Game.state === 'menu' || Game.state === 'gameover' || Game.state === 'victory_run') newGame();
    else if (Game.state === 'playing') releaseWave();
    else if (Game.state === 'paused') Game.state = 'playing';
  } else if (e.key === 'Enter') {
    e.preventDefault();
    ensureAudio();
    if (Game.state === 'menu' || Game.state === 'gameover' || Game.state === 'victory_run') newGame();
    else if (Game.state === 'playing') {
      for (const ball of Game.balls) if (ball.attached) launchBall(ball);
    }
    else if (Game.state === 'paused') Game.state = 'playing';
  } else if (e.key === 'p' || e.key === 'P') {
    if (Game.state === 'playing') Game.state = 'paused';
    else if (Game.state === 'paused') Game.state = 'playing';
  } else if (e.key === 'r' || e.key === 'R') {
    if (Game.state === 'gameover' || Game.state === 'paused' || Game.state === 'playing' || Game.state === 'victory_run')
      newGame();
  } else if (e.key === 'm' || e.key === 'M') {
    audioMuted = !audioMuted;
    floatText(W/2, 50, audioMuted ? '静音' : '开启声音', '#fff', 16);
  } else if (e.key === 'Shift') {
    if (Game.state === 'playing') fireDash();
  } else if (e.key === 'q' || e.key === 'Q') {
    if (Game.state === 'playing' && Game.run && Game.run.passives.freeze) {
      if (Game.freezeCharges > 0 && Game.freezeT <= 0) {
        Game.freezeCharges -= 1;
        Game.freezeT = 0.5;
        Game.flash = Math.max(Game.flash, 0.25);
        Game.flashColor = '#7c5fff';
        spawnParticles(Game.paddle.x + Game.paddle.w/2, Game.paddle.y - 30,
                       '#7c5fff', 18, [40, 160]);
        floatText(W/2, H/2, '★ 时间凝固 ★', '#7c5fff', 24);
        playSfx('powerup');
      } else {
        playSfx('deny');
      }
    }
  } else if (e.key === 'Escape') {
    if (Game.state === 'playing' || Game.state === 'paused') {
      Game.state = 'menu';
      Game.paddle = makePaddle();
      Game.balls = [];
    }
  }
});

window.addEventListener('keyup', (e) => {
  if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft')  Game.keys.a = false;
  if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') Game.keys.d = false;
});
document.addEventListener('visibilitychange', () => {
  if (document.hidden && Game.state === 'playing') Game.state = 'paused';
});

/* ---------------- Main loop ---------------- */
let lastTime = performance.now();
function loop(time) {
  const realDt = Math.min((time - lastTime) / 1000, 1/30);
  lastTime = time;
  Game.startT += realDt;

  if (Game.state === 'playing') {
    update(realDt * Game.timeScale);
  } else if (Game.state === 'levelclear') {
    Game.transitionT -= realDt;
    updateLightOnly(realDt);
    if (Game.transitionT <= 0) offerCardSelect();
  } else if (Game.state === 'card_select') {
    Game.cardSelectT += realDt;
    updateLightOnly(realDt);
  } else {
    updateLightOnly(realDt);
  }

  render();
  requestAnimationFrame(loop);
}

// Boot
Game.paddle = makePaddle();
requestAnimationFrame(loop);
</script>
</body>
